name: CI

on:
  push:
    branches: [main, feat/ci-pipeline]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: '8.2'

jobs:

  # ============================================================
  # Job 1 — Tests unitaires (pas de BDD)
  # ============================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_SECRET: '$ecretf0rt3st'
      JWT_PASSPHRASE: test-jwt-passphrase

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, intl, opcache, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Generate JWT keys
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists

      - name: Run unit tests
        run: php bin/phpunit --testsuite unit

  # ============================================================
  # Job 2 — Tests fonctionnels (avec MySQL)
  # ============================================================
  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      APP_ENV: test
      APP_SECRET: '$ecretf0rt3st'
      JWT_PASSPHRASE: test-jwt-passphrase
      DATABASE_URL: mysql://app:app@127.0.0.1:3306/app?serverVersion=8.0&charset=utf8mb4

    services:
      database:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, intl, opcache, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Generate JWT keys
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists

      - name: Create database schema
        run: php bin/console doctrine:schema:create --env=test

      - name: Run functional tests
        run: php bin/phpunit --testsuite functional

  # ============================================================
  # Job 3 — Build & Push image Docker (push main uniquement)
  # ============================================================
  docker-build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: functional-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
